<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="Irene Búrdalo — Dress me, juego de vestir personajes.">
    <meta name="author" content="Irene Búrdalo">
    <meta property="og:title" content="Irene Búrdalo — Dress me">
    <meta property="og:description" content="Juego de vestir personajes por Blurberrie.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="160x160" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ballet&family=Jua&family=Playwrite+US+Trad+Guides&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script>if(sessionStorage.getItem('page-transition'))document.documentElement.classList.add('transitioning')</script>
    <title>Irene Búrdalo — Dress me</title>
</head>

<body data-page-type="games">
    <h1 class="page-title">Dress me</h1>
    <h1 class="page-title page-title--bottom">Dress me</h1>

    <div class="page-container">
    <div id="dressup-container">
        <!-- Left arrows: pelo/bottoms=set01(grande), tops/shoes=set02(deco) -->
        <div class="dressup-arrows dressup-arrows--left">
            <button class="arrow-btn" data-cat="pelo" data-dir="-1">
                <img src="data/games/DRESS UP GAME/FLECHAS/set01_left.png" alt="prev pelo">
            </button>
            <button class="arrow-btn arrow-btn--deco" data-cat="tops" data-dir="-1">
                <img src="data/games/DRESS UP GAME/FLECHAS/set02_left.png" alt="prev tops">
            </button>
            <button class="arrow-btn" data-cat="bottoms" data-dir="-1">
                <img src="data/games/DRESS UP GAME/FLECHAS/set01_left.png" alt="prev bottoms">
            </button>
            <button class="arrow-btn arrow-btn--deco" data-cat="shoes" data-dir="-1">
                <img src="data/games/DRESS UP GAME/FLECHAS/set02_left.png" alt="prev shoes">
            </button>
        </div>


        <!-- Frame + character -->
        <div class="dressup-frame">
            <img src="data/games/DRESS UP GAME/MARCO/marco.png" alt="" class="dressup-marco">
            <div class="dressup-layers" id="dressup-layers">
                <!-- Las capas se insertan por JS -->
            </div>
        </div>

        <!-- Right arrows: pelo/bottoms=set02(deco), tops/shoes=set01(grande) -->
        <div class="dressup-arrows dressup-arrows--right">
            <button class="arrow-btn arrow-btn--deco" data-cat="pelo" data-dir="1">
                <img src="data/games/DRESS UP GAME/FLECHAS/set02_right.png" alt="next pelo">
            </button>
            <button class="arrow-btn" data-cat="tops" data-dir="1">
                <img src="data/games/DRESS UP GAME/FLECHAS/set01_right.png" alt="next tops">
            </button>
            <button class="arrow-btn arrow-btn--deco" data-cat="bottoms" data-dir="1">
                <img src="data/games/DRESS UP GAME/FLECHAS/set02_right.png" alt="next bottoms">
            </button>
            <button class="arrow-btn" data-cat="shoes" data-dir="1">
                <img src="data/games/DRESS UP GAME/FLECHAS/set01_right.png" alt="next shoes">
            </button>
        </div>
    </div>
    </div>

    <div class="dressup-actions">
        <button class="dressup-action-btn" id="btn-random">random</button>
        <button class="dressup-action-btn" id="btn-download">download</button>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/dressup.js"></script>
</body>

</html>
